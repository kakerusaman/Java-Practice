services:
  postgres:
    image: postgres:16
    container_name: springsecurity-spring7-db
    environment:
      POSTGRES_DB: springsecurity_spring7
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5434:5432"
    volumes:
      - springsecurity-spring7-data:/var/lib/postgresql/data

volumes:
  springsecurity-spring7-data:
